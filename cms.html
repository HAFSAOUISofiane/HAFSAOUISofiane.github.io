<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Writing CMS — Sofiane Hafsaoui</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
:root{
  --bg:#fff;--ink:#1a1a1a;--muted:#6b6b6b;--line:#e8e8e8;--soft:#f6f6f4;
  --sidebar:272px;--header:62px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:#fafafa;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
input,textarea,select,button{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ---- HEADER ---- */
.cms-header{height:var(--header);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex:0 0 auto;z-index:10}
.cms-brand{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:.4px;display:flex;align-items:center;gap:10px}
.cms-brand-sub{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:400}
.header-actions{display:flex;align-items:center;gap:12px}
.h-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:999px;font-size:12.5px;letter-spacing:.04em;cursor:pointer;transition:all .22s;border:1px solid var(--line);background:#fff;color:var(--ink)}
.h-btn:hover{border-color:var(--ink)}
.h-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.h-btn.primary:hover{background:#000}
.h-btn.danger{color:#c0392b;border-color:#f0d0ce}
.h-btn.danger:hover{background:#fdf2f2;border-color:#c0392b}
.h-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
.h-btn.primary svg{stroke:#fff}

/* ---- LAYOUT ---- */
.cms-body{display:flex;flex:1;min-height:0;overflow:hidden}

/* ---- SIDEBAR ---- */
.sidebar{width:var(--sidebar);background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex:0 0 auto;overflow:hidden}
.sidebar-top{padding:16px;border-bottom:1px solid var(--line);flex:0 0 auto}
.new-btn{width:100%;display:flex;align-items:center;gap:9px;padding:11px 14px;border-radius:10px;border:1px dashed var(--line);background:transparent;cursor:pointer;font-size:13px;color:var(--muted);transition:all .22s;letter-spacing:.02em}
.new-btn:hover{border-color:var(--ink);color:var(--ink);background:var(--soft)}
.new-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.art-item{padding:12px 14px;border-radius:10px;cursor:pointer;transition:background .18s;margin-bottom:2px}
.art-item:hover{background:var(--soft)}
.art-item.active{background:var(--ink)!important}
.art-item.active .ai-title{color:#fff}
.art-item.active .ai-meta{color:rgba(255,255,255,.55)}
.ai-title{font-size:13.5px;font-weight:500;line-height:1.35;margin-bottom:4px;color:var(--ink)}
.ai-meta{font-size:11.5px;color:var(--muted);display:flex;gap:8px}
.ai-cat{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}
.sidebar-empty{padding:32px 16px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.55}
.sidebar-empty strong{display:block;margin-bottom:6px;color:var(--ink);font-size:14px}

/* ---- EDITOR ---- */
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fafafa}
.editor-meta{padding:20px 28px 0;flex:0 0 auto;background:#fafafa}
.f-title{width:100%;border:0;background:transparent;font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;letter-spacing:-.3px;color:var(--ink);outline:none;margin-bottom:14px;line-height:1.15}
.f-title::placeholder{color:#ccc}
.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.meta-field{display:flex;flex-direction:column;gap:4px}
.meta-field label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.meta-input{border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:13px;background:#fff;color:var(--ink);outline:none;transition:border-color .2s}
.meta-input:focus{border-color:var(--ink)}
.meta-input.slug-f{width:220px}
.meta-input.cat-f{width:140px}
.meta-input.date-f{width:110px}
.meta-input.read-f{width:100px}
.f-excerpt{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:13.5px;color:#444;font-weight:300;resize:none;outline:none;transition:border-color .2s;background:#fff;line-height:1.6}
.f-excerpt:focus{border-color:var(--ink)}

/* ---- CONTENT AREA ---- */
.content-area{flex:1;display:flex;flex-direction:column;min-height:0;padding:0 28px 0;margin-top:14px}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:0;flex:0 0 auto}
.tab-btn{padding:10px 20px;font-size:12.5px;letter-spacing:.04em;border:0;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--ink)}
.tab-btn:hover{color:var(--ink)}
.panes{flex:1;min-height:0;position:relative}
.pane{position:absolute;inset:0;display:none}
.pane.active{display:flex;flex-direction:column}
#pane-write{padding-top:2px}
.f-content{width:100%;flex:1;border:0;background:#fff;border:1px solid var(--line);border-top:0;padding:18px;font-family:'SF Mono','Fira Code','Courier New',monospace;font-size:13.5px;line-height:1.75;color:var(--ink);resize:none;outline:none;border-radius:0 0 10px 10px}
.f-content:focus{border-color:var(--ink)}
#pane-preview{overflow-y:auto;background:#fff;border:1px solid var(--line);border-top:0;border-radius:0 0 10px 10px;padding:28px 32px}

/* preview typography */
#pane-preview h1,#pane-preview h2,#pane-preview h3{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.1;color:var(--ink);margin:2em 0 .6em}
#pane-preview h1{font-size:36px}
#pane-preview h2{font-size:28px}
#pane-preview h3{font-size:22px}
#pane-preview p{font-size:15.5px;line-height:1.8;color:#252525;font-weight:300;margin-bottom:1.4em}
#pane-preview strong{font-weight:500;color:var(--ink)}
#pane-preview ul,#pane-preview ol{padding-left:1.5em;margin-bottom:1.4em;font-size:15.5px;font-weight:300;line-height:1.8;color:#252525}
#pane-preview li{margin-bottom:.4em}
#pane-preview blockquote{border-left:2px solid var(--ink);padding:8px 0 8px 20px;margin:1.8em 0;color:var(--muted)}
#pane-preview blockquote p{margin:0;font-size:15.5px}
#pane-preview code{font-family:'SF Mono',monospace;font-size:.85em;background:var(--soft);padding:2px 6px;border-radius:4px}
#pane-preview pre{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:18px;overflow-x:auto;margin:1.6em 0}
#pane-preview pre code{background:none;padding:0}
#pane-preview hr{border:0;border-top:1px solid var(--line);margin:2.5em 0}
#pane-preview img{max-width:100%;border-radius:8px;margin:1.5em 0;display:block}
#pane-preview table{width:100%;border-collapse:collapse;margin:1.5em 0;font-size:.93em}
#pane-preview th{font-weight:500;padding:10px 12px;border-bottom:2px solid var(--line);text-align:left}
#pane-preview td{padding:9px 12px;border-bottom:1px solid var(--line);font-weight:300}

/* ---- BOTTOM BAR ---- */
.bottom-bar{flex:0 0 auto;padding:12px 28px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);background:#fafafa}
.upload-label{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:999px;font-size:12.5px;letter-spacing:.03em;cursor:pointer;transition:all .22s;border:1px solid var(--line);background:#fff;color:var(--muted)}
.upload-label:hover{border-color:var(--ink);color:var(--ink)}
.upload-label svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#f-upload{display:none}
.spacer{flex:1}

/* ---- EMPTY STATE ---- */
.editor-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px;text-align:center;padding:40px}
.editor-empty h3{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--ink)}
.editor-empty p{font-size:14px;max-width:320px;line-height:1.6}

/* ---- TOAST ---- */
#toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;font-size:12.5px;letter-spacing:.04em;padding:11px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .35s,transform .35s;white-space:nowrap;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---- CONFIRM DIALOG ---- */
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:80;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(2px)}
#confirm-overlay.open{opacity:1;pointer-events:auto}
#confirm-box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px 28px 24px;width:min(360px,90vw);box-shadow:0 24px 60px -20px rgba(0,0,0,.4)}
#confirm-box h4{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-bottom:8px}
#confirm-box p{font-size:14px;color:var(--muted);font-weight:300;margin-bottom:22px}
.confirm-btns{display:flex;gap:10px;justify-content:flex-end}
.confirm-btns button{padding:9px 18px;border-radius:999px;font-size:13px;cursor:pointer;transition:all .22s;font-family:inherit}
#confirm-cancel{border:1px solid var(--line);background:#fff;color:var(--muted)}
#confirm-cancel:hover{border-color:var(--ink);color:var(--ink)}
#confirm-ok{border:1px solid #c0392b;background:#c0392b;color:#fff}
#confirm-ok:hover{background:#a93226}

@media(max-width:760px){
  .sidebar{width:220px}
  .meta-input.slug-f{width:160px}
  .editor-meta{padding:16px 18px 0}
  .content-area{padding:0 18px 0}
  .bottom-bar{padding:10px 18px}
  .f-title{font-size:26px}
}
@media(max-width:560px){
  .sidebar{display:none}
  .cms-brand-sub{display:none}
}
</style>
</head>
<body>

<header class="cms-header">
  <div class="cms-brand">
    Sofiane Hafsaoui
    <span class="cms-brand-sub">Writing CMS</span>
  </div>
  <div class="header-actions">
    <button class="h-btn danger" id="btn-delete" style="display:none">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Delete
    </button>
    <button class="h-btn primary" id="btn-save" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save article
    </button>
    <a href="index.html" class="h-btn">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to site
    </a>
  </div>
</header>

<div class="cms-body">

  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="new-btn" id="btn-new">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New article
      </button>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <div class="editor" id="editor">
    <div class="editor-empty" id="editor-empty">
      <h3>No article selected</h3>
      <p>Pick an article from the list or create a new one to start writing.</p>
    </div>
    <div id="editor-form" style="display:none;flex:1;display:none;flex-direction:column;min-height:0">
      <div class="editor-meta">
        <input class="f-title" id="f-title" type="text" placeholder="Article title…" autocomplete="off"/>
        <div class="meta-row">
          <div class="meta-field">
            <label>Slug</label>
            <input class="meta-input slug-f" id="f-slug" type="text" placeholder="article-slug" autocomplete="off"/>
          </div>
          <div class="meta-field">
            <label>Category</label>
            <select class="meta-input cat-f" id="f-cat">
              <option>Strategy</option>
              <option>Product</option>
              <option>Growth</option>
              <option>AI &amp; Automation</option>
              <option>Finance</option>
              <option>Design</option>
              <option>Operations</option>
              <option>Other</option>
            </select>
          </div>
          <div class="meta-field">
            <label>Date</label>
            <input class="meta-input date-f" id="f-date" type="text" placeholder="Mar 2026" autocomplete="off"/>
          </div>
          <div class="meta-field">
            <label>Read time</label>
            <input class="meta-input read-f" id="f-read" type="text" placeholder="5 min read" autocomplete="off"/>
          </div>
        </div>
        <textarea class="f-excerpt" id="f-excerpt" rows="2" placeholder="Short excerpt shown on the articles list…"></textarea>
      </div>

      <div class="content-area">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="write">Write</button>
          <button class="tab-btn" data-tab="preview">Preview</button>
        </div>
        <div class="panes">
          <div class="pane active" id="pane-write">
            <textarea class="f-content" id="f-content" placeholder="Write your article in Markdown…&#10;&#10;# Heading&#10;&#10;Paragraph text, **bold**, *italic*…"></textarea>
          </div>
          <div class="pane" id="pane-preview"></div>
        </div>
      </div>

      <div class="bottom-bar">
        <label class="upload-label" for="f-upload">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload .md file
        </label>
        <input type="file" id="f-upload" accept=".md,.txt"/>
        <div class="spacer"></div>
        <a id="preview-link" href="#" target="_blank" class="h-btn" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          View article
        </a>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>
<div id="confirm-overlay">
  <div id="confirm-box">
    <h4>Delete article?</h4>
    <p>This will permanently remove the article. This cannot be undone.</p>
    <div class="confirm-btns">
      <button id="confirm-cancel">Cancel</button>
      <button id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<script>
// ─── Storage ───────────────────────────────────────────────────────────────
const STORE_KEY = 'sh_articles';

function load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); } catch{ return []; } }
function save(arts){ localStorage.setItem(STORE_KEY, JSON.stringify(arts)); }

let articles = load();
let currentId = null;

// ─── Sidebar ───────────────────────────────────────────────────────────────
function renderSidebar(){
  const list = document.getElementById('sidebar-list');
  if(!articles.length){
    list.innerHTML = `<div class="sidebar-empty"><strong>No articles yet</strong>Click "New article" to get started.</div>`;
    return;
  }
  const sorted = [...articles].sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
  list.innerHTML = sorted.map(art => `
    <div class="art-item${art.id===currentId?' active':''}" data-id="${art.id}">
      <div class="ai-title">${art.title||'Untitled'}</div>
      <div class="ai-meta">
        <span class="ai-cat">${art.category||''}</span>
        ${art.date ? `<span>${art.date}</span>` : ''}
      </div>
    </div>`).join('');
  list.querySelectorAll('.art-item').forEach(el =>
    el.addEventListener('click', () => selectArticle(el.dataset.id))
  );
}

// ─── Form state ────────────────────────────────────────────────────────────
function showEditor(show){
  document.getElementById('editor-empty').style.display = show ? 'none' : 'flex';
  const form = document.getElementById('editor-form');
  form.style.display = show ? 'flex' : 'none';
  document.getElementById('btn-save').style.display = show ? '' : 'none';
  document.getElementById('btn-delete').style.display = (show && currentId) ? '' : 'none';
}

function populateForm(art){
  document.getElementById('f-title').value = art.title || '';
  document.getElementById('f-slug').value = art.slug || '';
  document.getElementById('f-cat').value = art.category || 'Strategy';
  document.getElementById('f-date').value = art.date || '';
  document.getElementById('f-read').value = art.readTime || '';
  document.getElementById('f-excerpt').value = art.excerpt || '';
  document.getElementById('f-content').value = art.content || '';
  updatePreview();
  const link = document.getElementById('preview-link');
  link.href = `article.html?slug=${art.slug}`;
  link.style.display = art.slug ? '' : 'none';
}

function clearForm(){
  ['f-title','f-slug','f-date','f-read','f-excerpt','f-content'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-cat').value = 'Strategy';
  document.getElementById('pane-preview').innerHTML = '';
  document.getElementById('preview-link').style.display = 'none';
}

function getFormData(){
  return {
    title:    document.getElementById('f-title').value.trim(),
    slug:     document.getElementById('f-slug').value.trim(),
    category: document.getElementById('f-cat').value,
    date:     document.getElementById('f-date').value.trim(),
    readTime: document.getElementById('f-read').value.trim(),
    excerpt:  document.getElementById('f-excerpt').value.trim(),
    content:  document.getElementById('f-content').value,
  };
}

// ─── Actions ───────────────────────────────────────────────────────────────
function selectArticle(id){
  currentId = id;
  const art = articles.find(a => a.id === id);
  if(!art) return;
  populateForm(art);
  showEditor(true);
  renderSidebar();
}

function newArticle(){
  currentId = null;
  clearForm();
  showEditor(true);
  renderSidebar();
  document.getElementById('f-title').focus();
}

function slugify(text){
  return text.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9\s-]/g,'')
    .trim().replace(/\s+/g,'-').replace(/-+/g,'-');
}

function autoSlug(){
  const title = document.getElementById('f-title').value;
  const slugEl = document.getElementById('f-slug');
  if(!slugEl._edited) slugEl.value = slugify(title);
}

function saveArticle(){
  const data = getFormData();
  if(!data.title){ toast('Title is required'); return; }
  if(!data.slug) data.slug = slugify(data.title);
  const now = Date.now();
  if(currentId){
    const idx = articles.findIndex(a => a.id === currentId);
    if(idx !== -1) articles[idx] = { ...articles[idx], ...data, updatedAt: now };
  } else {
    const art = { ...data, id: now.toString(), createdAt: now, updatedAt: now };
    articles.unshift(art);
    currentId = art.id;
  }
  save(articles);
  renderSidebar();
  const link = document.getElementById('preview-link');
  link.href = `article.html?slug=${data.slug}`;
  link.style.display = data.slug ? '' : 'none';
  document.getElementById('btn-delete').style.display = '';
  toast('Article saved');
}

function deleteArticle(){
  if(!currentId) return;
  confirm2('Delete this article?', 'This will permanently remove the article from your CMS.', () => {
    articles = articles.filter(a => a.id !== currentId);
    save(articles);
    currentId = null;
    clearForm();
    showEditor(false);
    renderSidebar();
    toast('Article deleted');
  });
}

// ─── Markdown preview ──────────────────────────────────────────────────────
function updatePreview(){
  const md = document.getElementById('f-content').value;
  document.getElementById('pane-preview').innerHTML = marked.parse(md);
}

// ─── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    if(tab === 'preview') updatePreview();
    document.getElementById(`pane-${tab}`).classList.add('active');
  });
});

// ─── MD file upload ────────────────────────────────────────────────────────
document.getElementById('f-upload').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const md = ev.target.result;
    document.getElementById('f-content').value = md;
    updatePreview();
    // extract title from first # heading if title field is empty
    const titleEl = document.getElementById('f-title');
    if(!titleEl.value){
      const m = md.match(/^#\s+(.+)/m);
      if(m){ titleEl.value = m[1].trim(); autoSlug(); }
    }
    // estimate read time
    const words = md.split(/\s+/).length;
    const mins = Math.max(1, Math.round(words / 200));
    const readEl = document.getElementById('f-read');
    if(!readEl.value) readEl.value = `${mins} min read`;
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ─── Auto-slug from title ──────────────────────────────────────────────────
document.getElementById('f-title').addEventListener('input', autoSlug);
document.getElementById('f-slug').addEventListener('input', () => {
  document.getElementById('f-slug')._edited = true;
});
document.getElementById('f-content').addEventListener('input', () => {
  // live preview update only when preview tab active
  if(document.getElementById('pane-preview').classList.contains('active')) updatePreview();
});

// ─── Buttons ───────────────────────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click', newArticle);
document.getElementById('btn-save').addEventListener('click', saveArticle);
document.getElementById('btn-delete').addEventListener('click', deleteArticle);

// keyboard shortcut Ctrl/Cmd+S
document.addEventListener('keydown', e => {
  if((e.metaKey||e.ctrlKey) && e.key==='s'){
    e.preventDefault();
    if(document.getElementById('btn-save').style.display !== 'none') saveArticle();
  }
});

// ─── Toast ─────────────────────────────────────────────────────────────────
let _toastT;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── Confirm dialog ────────────────────────────────────────────────────────
let _confirmCb = null;
function confirm2(title, msg, cb){
  _confirmCb = cb;
  document.querySelector('#confirm-box h4').textContent = title;
  document.querySelector('#confirm-box p').textContent = msg;
  document.getElementById('confirm-overlay').classList.add('open');
}
document.getElementById('confirm-ok').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('open');
  if(_confirmCb){ _confirmCb(); _confirmCb = null; }
});
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('open');
  _confirmCb = null;
});
document.getElementById('confirm-overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('confirm-overlay')){
    document.getElementById('confirm-overlay').classList.remove('open');
    _confirmCb = null;
  }
});

// ─── Init ──────────────────────────────────────────────────────────────────
renderSidebar();
showEditor(false);
</script>
</body>
</html>
