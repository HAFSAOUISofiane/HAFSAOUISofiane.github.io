<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Article — Sofiane Hafsaoui</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
:root{--bg:#fff;--ink:#1a1a1a;--muted:#6b6b6b;--line:#e8e8e8;--soft:#f6f6f4;--max:1080px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--max);margin:0 auto;padding:0 32px}

nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
.brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:.5px}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-back{font-size:13px;letter-spacing:.04em;color:var(--muted);display:inline-flex;align-items:center;gap:6px;transition:color .2s}
.nav-back:hover{color:var(--ink)}
.nav-back svg{width:16px;height:16px;flex:0 0 auto}
.nav-cms{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);padding:7px 14px;border-radius:999px;transition:all .2s}
.nav-cms:hover{border-color:var(--ink);color:var(--ink)}

.art-hero{padding:140px 0 56px;border-bottom:1px solid var(--line)}
.art-cat{font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:var(--soft);color:var(--muted);padding:4px 12px;border-radius:999px;border:1px solid var(--line);display:inline-block;margin-bottom:22px}
.art-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(32px,6vw,66px);line-height:1.04;letter-spacing:-.5px;max-width:840px;margin-bottom:22px}
.art-meta{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13.5px}
.art-meta-sep{color:var(--line)}

.art-body{max-width:700px;padding:64px 0 100px;font-size:17px;line-height:1.82;color:#252525;font-weight:300}
.art-body h1,.art-body h2,.art-body h3{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:1.1;color:var(--ink);margin:2.2em 0 .7em}
.art-body h1{font-size:clamp(26px,3.8vw,40px)}
.art-body h2{font-size:clamp(22px,3vw,32px)}
.art-body h3{font-size:clamp(18px,2.4vw,26px)}
.art-body p{margin-bottom:1.5em}
.art-body strong{font-weight:500;color:var(--ink)}
.art-body em{font-style:italic}
.art-body ul,.art-body ol{padding-left:1.6em;margin-bottom:1.5em}
.art-body li{margin-bottom:.5em}
.art-body blockquote{border-left:2px solid var(--ink);padding:8px 0 8px 22px;margin:2em 0;color:var(--muted);font-size:1.04em}
.art-body blockquote p{margin:0}
.art-body code{font-family:'SF Mono','Fira Code',monospace;font-size:.85em;background:var(--soft);padding:2px 7px;border-radius:5px}
.art-body pre{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:22px;overflow-x:auto;margin:1.8em 0}
.art-body pre code{background:none;padding:0;font-size:.9em}
.art-body hr{border:0;border-top:1px solid var(--line);margin:3em 0}
.art-body a{border-bottom:1px solid var(--line);padding-bottom:1px;transition:border-color .2s}
.art-body a:hover{border-color:var(--ink)}
.art-body img{max-width:100%;border-radius:10px;margin:1.8em 0;display:block}
.art-body table{width:100%;border-collapse:collapse;margin:1.8em 0;font-size:.93em}
.art-body th{font-weight:500;text-align:left;padding:11px 14px;border-bottom:2px solid var(--line)}
.art-body td{padding:10px 14px;border-bottom:1px solid var(--line);font-weight:300}

.not-found{padding:180px 0 80px;text-align:center}
.not-found h2{font-family:'Cormorant Garamond',serif;font-size:50px;font-weight:600;margin-bottom:14px}
.not-found p{color:var(--muted);font-size:16px;margin-bottom:30px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:999px;font-size:13px;letter-spacing:.04em;border:1px solid var(--ink);transition:all .25s;background:var(--ink);color:#fff}
.btn:hover{background:#000}

footer{padding:48px 0;color:var(--muted);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;border-top:1px solid var(--line)}

@media(max-width:820px){.wrap{padding:0 26px}.art-hero{padding:110px 0 44px}.art-body{font-size:16px;padding:48px 0 80px}}
@media(max-width:600px){.wrap{padding:0 20px}.nav-inner{height:60px}.brand{font-size:18px}.art-hero{padding:86px 0 36px}}
</style>
</head>
<body>

<nav>
  <div class="wrap nav-inner">
    <a href="index.html" class="brand">Sofiane Hafsaoui</a>
    <div class="nav-links">
      <a href="index.html#articles" class="nav-back">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        All articles
      </a>
      <a href="cms.html" class="nav-cms">CMS</a>
    </div>
  </div>
</nav>

<div id="root"></div>

<footer class="wrap">
  <span>© 2026 Sofiane Hafsaoui</span>
  <span>Madrid, Spain · Operations & Strategy</span>
</footer>

<script>
const slug = new URLSearchParams(location.search).get('slug');

function getArticles(){
  try{ return JSON.parse(localStorage.getItem('sh_articles')||'[]'); }
  catch{ return []; }
}

function render(art){
  document.title = art.title + ' — Sofiane Hafsaoui';
  const metaParts = [art.date, art.readTime].filter(Boolean);
  document.getElementById('root').innerHTML = `
    <div class="art-hero">
      <div class="wrap">
        ${art.category ? `<span class="art-cat">${art.category}</span>` : ''}
        <h1 class="art-title">${art.title}</h1>
        ${metaParts.length ? `<div class="art-meta">${metaParts.map((p,i)=>i>0?`<span class="art-meta-sep">·</span><span>${p}</span>`:`<span>${p}</span>`).join('')}</div>` : ''}
      </div>
    </div>
    <div class="wrap">
      <div class="art-body">${marked.parse(art.content || '')}</div>
    </div>`;
}

function notFound(){
  document.getElementById('root').innerHTML = `
    <div class="not-found">
      <h2>Article not found</h2>
      <p>This article doesn't exist or may have been moved.</p>
      <a href="index.html#articles" class="btn">← Back to articles</a>
    </div>`;
}

if(!slug){
  notFound();
} else {
  const art = getArticles().find(a => a.slug === slug);
  if(art){
    render(art);
  } else {
    fetch(`articles/${slug}.md`)
      .then(r => { if(!r.ok) throw 0; return r.text(); })
      .then(md => render({
        title: slug.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase()),
        category:'', date:'', readTime:'', content: md
      }))
      .catch(notFound);
  }
}
</script>
</body>
</html>
