<style>
  :root{ --bg:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e8e8e8; --soft:#f6f6f4; --accent:#1a1a1a; --max:1080px; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 32px}

  nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid transparent;transition:border-color .3s, background .3s}
  nav.scrolled{border-color:var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
  .brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:.5px}
  .nav-links{display:flex;gap:34px;align-items:center}
  .nav-links a{font-size:13px;letter-spacing:.04em;color:var(--muted);transition:color .2s}
  .nav-links a:hover{color:var(--ink)}
  .lang-toggle{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .lang-toggle button{border:0;background:transparent;cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:.06em;padding:7px 13px;color:var(--muted);transition:all .25s}
  .lang-toggle button.active{background:var(--ink);color:#fff}

  header.hero{padding:190px 0 110px;border-bottom:1px solid var(--line)}
  .eyebrow{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-bottom:26px}
  h1.name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(52px,9vw,104px);line-height:.98;letter-spacing:-.5px}
  .role{font-size:clamp(17px,2.4vw,22px);color:var(--muted);margin-top:24px;max-width:640px;font-weight:300}
  .cta-row{display:flex;flex-wrap:wrap;gap:14px;margin-top:42px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:999px;font-size:13px;letter-spacing:.04em;border:1px solid var(--ink);transition:background .25s,color .25s;cursor:pointer}
  .btn.solid{background:var(--ink);color:#fff}
  .btn.solid:hover{background:#000}
  .btn.ghost:hover{background:var(--soft)}

  section{padding:96px 0;border-bottom:1px solid var(--line)}
  .sec-label{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-bottom:38px}
  h2.title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(30px,4.5vw,46px);line-height:1.08;letter-spacing:-.3px;margin-bottom:30px;position:relative}
  h2.title::after{content:"";position:absolute;left:0;bottom:-14px;height:2px;width:52px;background:var(--ink);transform:scaleX(0);transform-origin:left;transition:transform .8s cubic-bezier(.16,1,.3,1) .1s}
  h2.title.in::after{transform:scaleX(1)}
  .lead{font-size:19px;font-weight:300;color:#333;max-width:760px}
  .lead b{font-weight:500;color:var(--ink)}

  .skill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
  .skill-cell{background:var(--bg);padding:32px 28px;transition:background .3s}
  .skill-cell:hover{background:var(--soft)}
  .skill-cell h3{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-bottom:16px}
  .skill-cell .num{font-size:12px;color:var(--muted);letter-spacing:.1em;display:block;margin-bottom:14px}
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tags span{font-size:12.5px;color:#444;border:1px solid var(--line);border-radius:999px;padding:5px 12px;background:#fff}

  .exp{display:flex;gap:40px;padding:30px 0;border-top:1px solid var(--line);align-items:flex-start}
  .exp:first-of-type{border-top:0}
  .exp .when{flex:0 0 150px;font-size:13px;color:var(--muted);letter-spacing:.03em;padding-top:5px}
  .exp .body{flex:1}
  .exp h3{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .exp .co-role{font-size:14px;color:var(--muted);margin:4px 0 12px}
  .exp p{font-size:15.5px;color:#3a3a3a;font-weight:300;max-width:680px}
  .badge{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;background:var(--ink);color:#fff;padding:3px 10px;border-radius:999px;font-family:'Inter',sans-serif;font-weight:500}

  .two{display:grid;grid-template-columns:1fr 1fr;gap:64px}
  .edu-item{padding:22px 0;border-top:1px solid var(--line)}
  .edu-item:first-child{border-top:0}
  .edu-item h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
  .edu-item .school{font-size:14px;color:var(--muted);margin-top:2px}
  .edu-item .yr{font-size:12.5px;color:var(--muted);margin-top:6px;letter-spacing:.05em}
  .lang-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid var(--line)}
  .lang-row:first-of-type{border-top:0}
  .lang-row .l{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600}
  .lang-row .lvl{font-size:12.5px;color:var(--muted);letter-spacing:.04em;display:inline-flex;align-items:center}
  .dots{display:inline-flex;gap:5px;margin-left:14px}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dots i.on{background:var(--ink)}

  .art-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
  .art-feat{grid-column:1/-1}
  .art-card{border:1px solid var(--line);border-radius:16px;padding:30px 30px 26px;background:#fff;display:flex;flex-direction:column;min-height:200px}
  .art-meta{display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px}
  .art-cat{font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:var(--soft);color:var(--muted);padding:4px 11px;border-radius:999px;border:1px solid var(--line)}
  .art-date,.art-time{font-size:12.5px;color:var(--muted)}
  .art-sep{font-size:12.5px;color:var(--line)}
  .art-card h3{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;line-height:1.12;margin-bottom:12px}
  .art-feat h3{font-size:clamp(28px,3.8vw,40px)}
  .art-card p{font-size:14.5px;color:#444;font-weight:300;flex:1;margin-bottom:16px}
  .art-feat p{max-width:680px}
  .art-read{font-size:12.5px;letter-spacing:.04em;color:var(--ink);display:inline-flex;align-items:center;gap:6px;align-self:flex-start;border-bottom:1px solid var(--ink);padding-bottom:2px;transition:gap .25s}
  .art-read:hover{gap:11px}

  .contact-h{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(34px,6vw,68px);line-height:1.02;letter-spacing:-.5px;margin-bottom:34px}
  .contact-links{display:flex;flex-wrap:wrap;gap:14px}
  footer{padding:48px 0;color:var(--muted);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}

  .filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:42px}
  .filters button{border:1px solid var(--line);background:#fff;cursor:pointer;font-family:inherit;font-size:12.5px;letter-spacing:.04em;color:var(--muted);padding:9px 18px;border-radius:999px;transition:all .25s}
  .filters button:hover{border-color:#cfcfcf;color:var(--ink)}
  .filters button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .work-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
  .card{border:1px solid var(--line);border-radius:16px;padding:30px 30px 26px;background:#fff;display:flex;flex-direction:column;min-height:210px;box-shadow:0 0 0 rgba(0,0,0,0)}
  .card-top{display:flex;justify-content:space-between;align-items:baseline;gap:14px}
  .card h3{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;line-height:1.1}
  .card .yr{font-size:12px;color:var(--muted);letter-spacing:.06em;white-space:nowrap}
  .card p{font-size:14.5px;color:#444;font-weight:300;margin-top:12px;flex:1}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px}
  .chips span{font-size:11px;letter-spacing:.05em;color:#555;background:var(--soft);border-radius:999px;padding:4px 11px}
  .card .live{margin-top:16px;font-size:12.5px;letter-spacing:.04em;color:var(--ink);display:inline-flex;align-items:center;gap:6px;align-self:flex-start;border-bottom:1px solid var(--ink);padding-bottom:2px;transition:gap .25s}
  .card .live:hover{gap:11px}

  #progress{position:fixed;top:0;left:0;height:2px;background:var(--ink);z-index:60;width:100%;transform-origin:0 50%}
  .decode{display:inline-block;font-variant-ligatures:none;cursor:pointer}

  .v2-badge{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:60;background:var(--ink);color:#fff;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:8px 16px;border-radius:999px;box-shadow:0 10px 30px -12px rgba(0,0,0,.5);opacity:.9}

  @media(max-width:820px){
    .nav-links a{display:none}
    .skill-grid{grid-template-columns:1fr}
    .work-grid{grid-template-columns:1fr}
    .art-grid{grid-template-columns:1fr}
    .two{grid-template-columns:1fr;gap:40px}
    .exp{flex-direction:column;gap:8px}
    .exp .when{flex-basis:auto}
    header.hero{padding:150px 0 80px}
    .wrap{padding:0 26px}
    section{padding:78px 0}
  }
  @media(max-width:600px){
    .wrap{padding:0 20px}
    .nav-inner{height:60px}
    .brand{font-size:18px}
    .lang-toggle button{padding:8px 13px}
    header.hero{padding:114px 0 56px}
    .eyebrow{margin-bottom:20px;font-size:11px;letter-spacing:.24em}
    h1.name{font-size:clamp(42px,12.5vw,60px);line-height:1}
    .role{font-size:16px;margin-top:18px;line-height:1.55}
    .cta-row{margin-top:30px;gap:10px}
    section{padding:58px 0}
    .sec-label{margin-bottom:26px}
    h2.title{font-size:27px;margin-bottom:24px}
    .lead{font-size:16.5px}
    .skill-cell{padding:26px 22px}
    .skill-cell h3{font-size:22px}
    .exp{padding:24px 0}
    .exp h3{font-size:23px}
    .card h3{font-size:24px}
    .edu-item h3{font-size:20px}
    .contact-h{font-size:clamp(32px,9vw,44px);margin-bottom:28px}
    .contact-links{flex-direction:column;gap:10px}
    .contact-links .btn{width:100%;justify-content:center}
    footer{padding:34px 0 80px;font-size:12px}
  }
  @media(max-width:430px){
    h1.name{font-size:clamp(38px,12vw,52px)}
    .cta-row{flex-direction:column}
    .cta-row .btn{width:100%;justify-content:center}
  }
  .cursor-ring{position:fixed;top:0;left:0;width:26px;height:26px;margin:-13px 0 0 -13px;border:1.5px solid var(--ink);border-radius:50%;pointer-events:none;z-index:9999}
  @media(pointer:coarse){.cursor-ring{display:none}}
  .marquee{overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:24px 0;background:var(--bg)}
  .marquee-track{display:flex;white-space:nowrap;width:max-content}
  .marquee span{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:clamp(26px,5vw,52px);color:var(--ink);letter-spacing:-.01em}
  @media(max-width:600px){.marquee{padding:18px 0}}
  #grid-overlay{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity .5s;background-image:linear-gradient(rgba(0,0,0,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.05) 1px,transparent 1px);background-size:34px 34px}
  #grid-overlay.on{opacity:1}
  #grid-overlay::after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.11) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.11) 1px,transparent 1px);background-size:170px 170px}
  #toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(18px);background:var(--ink);color:#fff;font-size:13px;letter-spacing:.04em;padding:13px 22px;border-radius:999px;z-index:95;opacity:0;pointer-events:none;transition:opacity .4s,transform .4s;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #think-trigger{position:fixed;left:26px;bottom:26px;z-index:55;display:flex;align-items:center;background:#fff;border:1px solid var(--line);border-radius:999px;height:42px;padding:0 14px;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .35s cubic-bezier(.16,1,.3,1);box-shadow:0 6px 24px -16px rgba(0,0,0,.4)}
  #think-trigger .dot{width:8px;height:8px;border-radius:50%;background:var(--ink);flex:0 0 auto;animation:pulse 2.4s infinite}
  #think-trigger .lbl{max-width:0;opacity:0;white-space:nowrap;font-size:12.5px;letter-spacing:.04em;transition:all .35s;margin-left:0}
  #think-trigger:hover{border-color:var(--ink);color:var(--ink)}
  #think-trigger:hover .lbl{max-width:140px;opacity:1;margin-left:10px}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.5);opacity:.35}}
  #think-overlay{position:fixed;inset:0;background:rgba(20,20,20,.26);z-index:80;opacity:0;pointer-events:none;transition:opacity .4s;backdrop-filter:blur(2px)}
  #think-overlay.open{opacity:1;pointer-events:auto}
  #think-panel{position:fixed;top:0;right:0;height:100%;width:min(440px,90vw);background:#fff;z-index:90;transform:translateX(100%);transition:transform .55s cubic-bezier(.16,1,.3,1);padding:54px 40px;overflow-y:auto;border-left:1px solid var(--line)}
  #think-panel.open{transform:none}
  #think-panel .close{position:absolute;top:22px;right:26px;border:0;background:none;font-size:24px;line-height:1;cursor:pointer;color:var(--muted)}
  #think-panel h2{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;margin-bottom:8px}
  #think-panel .pintro{font-size:14.5px;color:var(--muted);font-weight:300;margin-bottom:30px;max-width:330px}
  .principle{padding:20px 0;border-top:1px solid var(--line);display:flex;gap:16px}
  .principle .n{font-size:12px;color:var(--muted);padding-top:6px;letter-spacing:.1em}
  .principle h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:3px}
  .principle p{font-size:14px;color:#444;font-weight:300}
  #dock{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:58;display:flex;gap:12px;align-items:center}
  .dock-btn{position:relative;display:flex;align-items:center;gap:9px;cursor:pointer;font-family:inherit;font-size:13px;letter-spacing:.04em;padding:11px 19px 11px 15px;border-radius:999px;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s,background .3s,border-color .3s}
  .dock-btn svg{width:20px;height:20px;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .dock-btn:hover{transform:translateY(-3px)}
  #brain-btn{background:var(--ink);color:#fff;border:0;box-shadow:0 12px 34px -14px rgba(0,0,0,.55)}
  #brain-btn:hover{box-shadow:0 18px 40px -14px rgba(0,0,0,.6)}
  #brain-btn svg{stroke:#fff}
  #tools-btn{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:0 12px 30px -16px rgba(0,0,0,.4)}
  #tools-btn:hover{border-color:var(--ink)}
  #tools-btn svg{stroke:var(--ink)}
  .bb-pulse{position:absolute;left:15px;width:20px;height:20px;border-radius:50%;border:1px solid rgba(255,255,255,.5);animation:bbpulse 2.6s infinite;pointer-events:none}
  @keyframes bbpulse{0%{transform:scale(1);opacity:.5}70%{transform:scale(2.1);opacity:0}100%{opacity:0}}
  #tools-overlay{position:fixed;inset:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(7px);opacity:0;pointer-events:none;transition:opacity .5s;display:flex;flex-direction:column}
  #tools-overlay.open{opacity:1;pointer-events:auto}
  #tools-close{border:1px solid var(--line);background:#fff;width:44px;height:44px;border-radius:50%;font-size:24px;line-height:1;cursor:pointer;color:var(--muted);flex:0 0 auto;transition:.25s}
  #tools-close:hover{border-color:var(--ink);color:var(--ink);transform:rotate(90deg)}
  #tools-stage{flex:1;overflow-y:auto;padding:16px 38px 44px;display:flex;flex-direction:column;gap:32px}
  .tgroup{opacity:0;transform:translateY(16px);transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1)}
  #tools-stage.play .tgroup{opacity:1;transform:none}
  .tgroup-h{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
  .tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:14px}
  .tool{display:flex;flex-direction:column;align-items:center;gap:12px;padding:22px 12px;border:1px solid var(--line);border-radius:14px;background:#fff;cursor:pointer;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s,border-color .3s}
  .tool:hover{transform:translateY(-4px);box-shadow:0 16px 40px -24px rgba(0,0,0,.4);border-color:#dcdcdc}
  .tool-ic{width:40px;height:40px;display:flex;align-items:center;justify-content:center}
  .tool-ic img{width:37px;height:37px;transition:transform .35s cubic-bezier(.16,1,.3,1)}
  .tool:hover .tool-ic img{transform:scale(1.1)}
  .tool-ic svg{width:37px;height:37px;transition:transform .35s cubic-bezier(.16,1,.3,1)}
  .tool:hover .tool-ic svg{transform:scale(1.1)}
  .mono{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Inter',sans-serif;font-weight:600;font-size:15px;letter-spacing:.01em;transition:transform .35s cubic-bezier(.16,1,.3,1)}
  .mono.adobe{background:#15191f}
  .tool:hover .mono{transform:scale(1.1)}
  .tool .tname{font-size:12.5px;color:#555;text-align:center}
  #tool-pop-overlay{position:fixed;inset:0;z-index:110;background:rgba(20,20,20,.3);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .35s;display:flex;align-items:center;justify-content:center;padding:24px}
  #tool-pop-overlay.open{opacity:1;pointer-events:auto}
  #tool-pop{width:min(380px,92vw);background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 30px 28px;box-shadow:0 30px 80px -30px rgba(0,0,0,.5);transform:translateY(16px) scale(.97);transition:transform .45s cubic-bezier(.16,1,.3,1);position:relative}
  #tool-pop-overlay.open #tool-pop{transform:none}
  #tool-pop .tp-close{position:absolute;top:15px;right:18px;border:0;background:none;font-size:23px;color:var(--muted);cursor:pointer;line-height:1;transition:.25s}
  #tool-pop .tp-close:hover{color:var(--ink);transform:rotate(90deg)}
  #tool-pop .tp-head{display:flex;align-items:center;gap:15px}
  #tool-pop .tp-ic{width:48px;height:48px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}

  function wireNet(stage){
    const nodes=[].slice.call(stage.querySelectorAll('.node-g'));

    function clearF(){stage.classList.remove('dim');nodes.forEach(n=>n.classList.remove('on'));edges.forEach(e=>e.classList.remove('on'));}

      edges.forEach(e=>{const a=e.dataset.a,b=e.dataset.b;if(a===id||b===id){e.classList.add('on');nb[a]=1;nb[b]=1;}});
      nodes.forEach(n=>{if(nb[n.dataset.id])n.classList.add('on');});
    }
    stage._focus=focusF; stage._clear=clearF;
    nodes.forEach(n=>{
      n.addEventListener('mouseenter',()=>{ if(!window._netPinned) focusF(n.dataset.id,n.dataset.cat); });

      n.addEventListener('click',e=>{e.stopPropagation();focusF(n.dataset.id,n.dataset.cat);});
    });
