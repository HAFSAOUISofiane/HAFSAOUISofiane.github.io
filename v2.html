const SPRING = { type:"spring", stiffness:90, damping:18, mass:0.8 };
const SOFT = { type:"spring", stiffness:80, damping:16 };

function Reveal({ children, tag="div", className, delay=0, y=24, ...rest }){
  const rm = useReducedMotion();
  const M = motion[tag] || motion.div;
  return (
    <M className={className}
       initial={rm ? false : { opacity:0, y }}
       whileInView={{ opacity:1, y:0 }}
       viewport={{ once:true, margin:"-8% 0px" }}
       transition={rm ? { duration:0 } : { ...SPRING, delay }}
       {...rest}>{children}</M>
  );
}

function Title({ children }){
  const rm = useReducedMotion();
  const [inview, setInview] = useState(false);
  return (
    <motion.h2 className={"title" + (inview ? " in" : "")}
      initial={rm ? false : { opacity:0, y:20 }}
      whileInView={{ opacity:1, y:0 }}
      viewport={{ once:true, margin:"-8% 0px" }}
      transition={rm ? { duration:0 } : SPRING}
      onViewportEnter={() => setInview(true)}>{children}</motion.h2>
  );
}

function Magnetic({ children, className, href, target, onClick }){
  const rm = useReducedMotion();
  const ref = useRef(null);
  const x = useMotionValue(0), y = useMotionValue(0);
  const sx = useSpring(x, { stiffness:220, damping:16 });
  const sy = useSpring(y, { stiffness:220, damping:16 });
  function move(e){
    if(rm || !ref.current) return;
    const r = ref.current.getBoundingClientRect();
    x.set((e.clientX - (r.left + r.width/2)) * 0.28);
    y.set((e.clientY - (r.top + r.height/2)) * 0.28);
  }
  function leave(){ x.set(0); y.set(0); }
  return (
    <motion.a ref={ref} href={href} target={target} onClick={onClick}
      className={className} style={{ x:sx, y:sy }}
      onMouseMove={move} onMouseLeave={leave}
      whileTap={{ scale:0.96 }}>{children}</motion.a>
  );
}

const CH = "ABCDEF0123456789!<>-_/[]{}=+*#@§";
function Decode({ text }){
  const rm = useReducedMotion();
  const [out, setOut] = useState(text);
  const idRef = useRef(null);
  function run(){
    if(rm){ setOut(text); return; }
    clearInterval(idRef.current);
    const settle = [];
    for(let i=0;i<text.length;i++) settle[i] = Math.floor(Math.random()*10) + i*3;
    const max = Math.max(...settle); let f = 0;
    idRef.current = setInterval(() => {
      let o = "";
      for(let i=0;i<text.length;i++){
        if(text[i]===" "){ o+=" "; continue; }
        o += f>=settle[i] ? text[i] : CH[Math.floor(Math.random()*CH.length)];
      }
      setOut(o); f++;
      if(f > max+1){ clearInterval(idRef.current); setOut(text); }
    }, 42);
  }
  useEffect(() => { const t = setTimeout(run, 220); return () => { clearTimeout(t); clearInterval(idRef.current); }; }, []);
  return <span className="decode" onMouseEnter={run}>{out}</span>;
}

  const t = (k) => (I18N[lang] && I18N[lang][k] !== undefined) ? I18N[lang][k] : ((I18N.en[k] !== undefined) ? I18N.en[k] : k);
  return (
    <React.Fragment>
      <Progress />
      <Nav lang={lang} setLang={setLang} t={t} />
      <Hero t={t} />
      <About t={t} />
      <Skills t={t} />
      <Experience t={t} />
      <Work t={t} />
      <Articles t={t} />
      <Education t={t} />
      <Contact t={t} />
      <footer className="wrap">
        <span>© 2026 Sofiane Hafsaoui</span>
        <span>{t("foot")}</span>
      </footer>
      <div className="v2-badge">Motion preview</div>
    </React.Fragment>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
